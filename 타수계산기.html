<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타수 및 DPS 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        select, input {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
            background-size: 1em;
        }
        input[type="number"] {
            background-image: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-md mx-auto card p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
            ⚔️ 타수 계산기
            <span class="text-sm font-normal text-blue-600 bg-blue-50 px-2 py-1 rounded">통합 타수 계산</span>
        </h1>

        <div class="space-y-6">
            <!-- 주기 정보 요약 -->
            <div class="grid grid-cols-2 gap-2 bg-gray-50 p-3 rounded-lg border border-gray-100 text-[11px] text-center">
                <div class="border-r border-gray-200">
                    <p class="text-gray-400">전직 주기</p>
                    <p id="tierIntervalDisplay" class="font-bold text-blue-600">0.900s</p>
                </div>
                <div>
                    <p class="text-gray-400">스킬2 주기</p>
                    <p id="extraIntervalDisplay" class="font-bold text-emerald-600">1.000s</p>
                </div>
                <div class="border-t border-gray-200 pt-1 mt-1 border-r">
                    <p class="text-gray-400">오라 주기</p>
                    <p id="auraIntervalDisplay" class="font-bold text-indigo-600">1.000s</p>
                </div>
                <div class="border-t border-gray-200 pt-1 mt-1">
                    <p class="text-gray-400">정령 주기</p>
                    <p id="spiritIntervalDisplay" class="font-bold text-purple-600">1.000s</p>
                </div>
            </div>

            <!-- 입력 섹션 -->
            <div class="space-y-4">
                <!-- 1. 전직 스킬 설정 -->
                <div class="p-4 bg-blue-50/50 rounded-xl border border-blue-100 space-y-4">
                    <div class="flex items-center justify-between">
                        <label class="text-sm font-bold text-blue-800">공통 보너스 & 전직 설정</label>
                        <div class="flex items-center gap-2">
                            <span class="text-[11px] text-gray-500 whitespace-nowrap">쿨감:</span>
                            <input type="number" id="cooltimeReduction" value="0" min="0" max="50" class="w-16 p-1 border border-gray-300 rounded text-xs text-center">
                            <span class="text-[11px] text-gray-500">%</span>
                        </div>
                    </div>
                    
                    <div class="space-y-3">
                        <div>
                            <label class="block text-[11px] text-gray-600 mb-1">① 직업 기본 타수 (스킬 차수)</label>
                            <select id="skillTier" class="w-full p-2 border border-gray-300 rounded bg-white text-sm">
                                <option value="2">1차 스킬 (2타)</option>
                                <option value="4">2차 스킬 (4타)</option>
                                <option value="6">3차 스킬 (6타)</option>
                                <option value="8">4차 스킬 (8타)</option>
                                <option value="12">5차 스킬 (12타)</option>
                                <option value="18">6차 스킬 (18타)</option>
                                <option value="24" selected>7차 스킬 (24타)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-[11px] text-gray-600 mb-1 font-bold text-indigo-600">💠 전직 전용 룬 설정 (주기 최종 차감)</label>
                            <select id="tierRune" class="w-full p-2 border border-gray-300 rounded bg-white text-sm">
                                <option value="0">룬 장착 안함 (-0.00s)</option>
                                <option value="0.02">최하급 룬 (-0.02s)</option>
                                <option value="0.04">하급 룬 (-0.04s)</option>
                                <option value="0.06">중급 룬 (-0.06s)</option>
                                <option value="0.08">상급 룬 (-0.08s)</option>
                                <option value="0.10">최상급 룬 (-0.10s)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-[11px] text-gray-600 mb-1 font-bold text-red-500">② 초월 추가 타수 (전직/공격2 적용)</label>
                            <select id="transLevel" class="w-full p-2 border border-gray-300 rounded bg-white text-sm">
                                <option value="0">미초월 (+0)</option>
                                <option value="1">1단계 (+1)</option>
                                <option value="2">2단계 (+2)</option>
                                <option value="3">3단계 (+3)</option>
                                <option value="4">4단계 (+4)</option>
                                <option value="5">5단계 (+5)</option>
                                <option value="6">6단계 (+6)</option>
                                <option value="7">7단계 (+7)</option>
                                <option value="8">8단계 (+8)</option>
                                <option value="9">9단계 (+9)</option>
                                <option value="10">10단계 (+10)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-[11px] text-gray-600 mb-1 font-bold text-red-500">③ 모든 클래스 타격 패시브 (전직/공격2 적용)</label>
                            <select id="hitCountSelect" class="w-full p-2 border border-gray-300 rounded bg-white text-sm">
                                <option value="0">패시브 없음 (+0)</option>
                                <option value="1">1타 추가</option>
                                <option value="2">2타 추가</option>
                                <option value="3">3타 추가</option>
                                <option value="4">4타 추가</option>
                                <option value="5">5타 추가</option>
                                <option value="6" selected>6타 추가</option>
                            </select>
                        </div>
                    </div>

                    <div class="p-3 bg-white/60 rounded-lg border border-blue-200">
                        <div class="flex justify-between text-[11px] mb-1">
                            <span class="text-gray-500">최종 주기 (0.9s*쿨감 - 룬):</span>
                            <span id="displayTierInterval" class="font-bold text-blue-700">0.900s</span>
                        </div>
                        <div class="flex justify-between text-[11px]">
                            <span class="text-gray-500">현재 총 합계 타수:</span>
                            <span id="displayTierHits" class="font-bold text-blue-700">0타</span>
                        </div>
                    </div>
                </div>

                <!-- 2. 공격 스킬 2 -->
                <div class="p-4 bg-emerald-50/50 rounded-xl border border-emerald-100 space-y-4">
                    <label class="block text-sm font-bold text-emerald-800">공격 스킬 2</label>
                    
                    <div class="grid grid-cols-1 gap-3">
                        <div>
                            <label class="block text-[11px] text-gray-600 mb-1">💠 스킬 등급 (기본 타수)</label>
                            <select id="extraSkillGrade" class="w-full p-2 border border-gray-300 rounded bg-white text-xs font-bold">
                                <option value="8">일반 (기본 8타)</option>
                                <option value="10">고급 (기본 10타)</option>
                                <option value="12">상급 (기본 12타)</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] text-gray-600 mb-1">☆ 성급 (타수 추가)</label>
                            <select id="extraSkillStars" class="w-full p-2 border border-gray-300 rounded bg-white text-xs font-bold">
                                <option value="0">1성 (+0타)</option>
                                <option value="1">2성 (+1타)</option>
                                <option value="2">3성 (+2타)</option>
                                <option value="3">4성 (+3타)</option>
                                <option value="4">5성 (+4타)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] text-gray-600 mb-1">랭크 (주기 감소)</label>
                            <select id="extraSkillRank" class="w-full p-2 border border-gray-300 rounded bg-white text-xs font-bold">
                                <option value="0">E 랭크 (기본)</option>
                                <option value="0.03">D 랭크 (-0.03s)</option>
                                <option value="0.06">C 랭크 (-0.06s)</option>
                                <option value="0.09">B 랭크 (-0.09s)</option>
                                <option value="0.12">A 랭크 (-0.12s)</option>
                                <option value="0.15">S 랭크 (-0.15s)</option>
                            </select>
                        </div>
                    </div>

                    <div class="p-3 bg-white/60 rounded-lg border border-emerald-200">
                        <div class="flex justify-between text-[11px] mb-1">
                            <span class="text-gray-500 text-emerald-600">계산 주기 (1.0s*쿨감 - 랭크):</span>
                            <span id="displayExtraInterval" class="font-bold text-emerald-700">1.000s</span>
                        </div>
                        <div class="flex justify-between text-[11px]">
                            <span class="text-gray-500">현재 총 합계 타수:</span>
                            <span id="displayGradeHits" class="font-bold text-emerald-700">8타</span>
                        </div>
                    </div>
                </div>

                <!-- 3. 7차 패시브 (오라/정령/축복) -->
                <div class="p-4 bg-purple-50/50 rounded-xl border border-purple-100 space-y-4">
                    <label class="block text-sm font-bold text-purple-800">7차 패시브 (오라/정령/축복)</label>
                    <div class="grid grid-cols-1 gap-3">
                        <div>
                            <label class="block text-[11px] font-medium text-indigo-700 mb-1">🌀 오라 단계</label>
                            <select id="auraLevel" class="w-full p-2 border border-indigo-200 rounded bg-white text-xs font-mono">
                                <option value="0">미장착 (None)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-purple-700 mb-1">✨ 정령 단계</label>
                            <select id="spiritLevel" class="w-full p-2 border border-purple-200 rounded bg-white text-xs font-mono">
                                <option value="0">미장착 (None)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-rose-600 mb-1">💖 환희의 축복 레벨</label>
                        <select id="blessingLevel" class="w-full p-2 border border-rose-200 rounded text-xs bg-white font-mono">
                            <option value="0">미장착 (None)</option>
                        </select>
                    </div>

                    <div class="p-3 bg-white/60 rounded-lg border border-purple-200 space-y-2">
                        <div class="border-b border-indigo-100 pb-2">
                            <div class="flex justify-between text-[11px] mb-1">
                                <span class="text-gray-500 text-indigo-600">오라 계산 주기:</span>
                                <span id="displayAuraIntervalInner" class="font-bold text-indigo-700">1.000s</span>
                            </div>
                            <div class="flex justify-between text-[11px]">
                                <span class="text-gray-500 text-indigo-600">오라 1회 타수 (축복포함):</span>
                                <span id="displayAuraHits" class="font-bold text-indigo-700">0타</span>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-[11px] mb-1">
                                <span class="text-gray-500 text-purple-600">정령 계산 주기:</span>
                                <span id="displaySpiritIntervalInner" class="font-bold text-purple-700">1.000s</span>
                            </div>
                            <div class="flex justify-between text-[11px]">
                                <span class="text-gray-500 text-purple-600">정령 1회 타수 (축복포함):</span>
                                <span id="displaySpiritHits" class="font-bold text-purple-700">0타</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 결과 대시보드 -->
            <div class="pt-6 border-t border-gray-100">
                <div class="bg-slate-800 p-5 rounded-2xl text-center shadow-lg mb-4">
                    <p class="text-xs text-slate-400 font-semibold mb-1">1분 최종 합계 타수</p>
                    <p id="totalHits" class="text-4xl font-extrabold text-white tracking-tight">0</p>
                    <div class="mt-3 flex justify-center flex-wrap gap-x-4 gap-y-1 text-[10px] text-slate-500 border-t border-slate-700 pt-3">
                        <span>전직: <b id="tierPart" class="text-blue-400">0</b></span>
                        <span>스킬2: <b id="extraPart" class="text-emerald-400">0</b></span>
                        <span>오라: <b id="auraPart" class="text-indigo-400">0</b></span>
                        <span>정령: <b id="spiritPart" class="text-purple-400">0</b></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const elements = {
            skillTier: document.getElementById('skillTier'),
            tierRune: document.getElementById('tierRune'),
            cooltime: document.getElementById('cooltimeReduction'),
            trans: document.getElementById('transLevel'),
            aura: document.getElementById('auraLevel'),
            spirit: document.getElementById('spiritLevel'),
            blessing: document.getElementById('blessingLevel'),
            passive: document.getElementById('hitCountSelect'),
            extraSkillGrade: document.getElementById('extraSkillGrade'),
            extraSkillStars: document.getElementById('extraSkillStars'),
            extraSkillRank: document.getElementById('extraSkillRank'),
            displayTierInterval: document.getElementById('displayTierInterval'),
            displayTierHits: document.getElementById('displayTierHits'),
            displayGradeHits: document.getElementById('displayGradeHits'),
            displayExtraInterval: document.getElementById('displayExtraInterval'),
            displayAuraHits: document.getElementById('displayAuraHits'),
            displaySpiritHits: document.getElementById('displaySpiritHits'),
            displayAuraIntervalInner: document.getElementById('displayAuraIntervalInner'),
            displaySpiritIntervalInner: document.getElementById('displaySpiritIntervalInner'),
            tInt: document.getElementById('tierIntervalDisplay'),
            eInt: document.getElementById('extraIntervalDisplay'),
            aInt: document.getElementById('auraIntervalDisplay'),
            sInt: document.getElementById('spiritIntervalDisplay'),
            totalHits: document.getElementById('totalHits'),
            tierPart: document.getElementById('tierPart'),
            extraPart: document.getElementById('extraPart'),
            auraPart: document.getElementById('auraPart'),
            spiritPart: document.getElementById('spiritPart')
        };

        function getSpecialStats(level) {
            if (level === 0) return { interval: 1.0, hits: 0 };
            const interval = 1.0 - ((level - 1) * 0.02);
            const hits = 6 + (level - 1); 
            return { interval, hits };
        }

        function init() {
            const specialSelects = [elements.aura, elements.spirit];
            specialSelects.forEach(select => {
                for (let lv = 1; lv <= 10; lv++) {
                    const stats = getSpecialStats(lv);
                    const opt = document.createElement('option');
                    opt.value = lv;
                    opt.textContent = `${lv}단계 | ${stats.interval.toFixed(2)}s | 기본 +${stats.hits}타`;
                    select.appendChild(opt);
                }
            });

            for (let i = 1; i <= 23; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                const reducVal = (i * 0.01).toFixed(2);
                const bonusHits = Math.floor(i / 5);
                opt.textContent = `${i}레벨 | -${reducVal}s 주기감소 | 보너스 +${bonusHits}타`;
                elements.blessing.appendChild(opt);
            }
            
            Object.values(elements).forEach(el => {
                if(el && (el.tagName === 'SELECT' || el.tagName === 'INPUT')) {
                    el.addEventListener('change', calculate);
                    el.addEventListener('input', calculate);
                }
            });
            calculate();
        }

        function calculate() {
            const passiveHits = parseInt(elements.passive.value) || 0;
            const transHits = parseInt(elements.trans.value) || 0;
            const blessingLv = parseInt(elements.blessing.value) || 0;
            const blessingReduc = blessingLv * 0.01;
            const blessingBonusHits = Math.floor(blessingLv / 5);
            const runeIntervalReduction = parseFloat(elements.tierRune.value) || 0;

            // 공통 쿨타임 감소 계수 (최대 50%)
            const cdFactor = (1 - (Math.min(parseInt(elements.cooltime.value), 50) / 100));

            // 1. 전직 스킬
            const baseHits = parseInt(elements.skillTier.value);
            const baseInterval = 0.9; 
            const intermediateInterval = baseInterval * cdFactor;
            const tInterval = Math.max(intermediateInterval - runeIntervalReduction, 0.001);
            
            const tHitsPerAction = baseHits + transHits + passiveHits; 
            const tActionCount = 60 / tInterval;
            const tFinalHits = tActionCount * tHitsPerAction;
            
            elements.displayTierInterval.innerText = tInterval.toFixed(3) + 's';
            elements.displayTierHits.innerText = tHitsPerAction + '타';

            // 2. 공격 스킬 2 (수정됨: 쿨타임 감소 선적용 후 랭크 차감)
            const internalBaseInterval = 1.0;
            const gradeBaseHits = parseInt(elements.extraSkillGrade.value) || 8; 
            const rankReduction = parseFloat(elements.extraSkillRank.value) || 0;
            const starBonusHits = parseInt(elements.extraSkillStars.value) || 0;
            
            // 로직: (기본 1.0s * 쿨감계수) - 랭크수치
            const extraIntermediateInterval = internalBaseInterval * cdFactor;
            const finalExtraInterval = Math.max(extraIntermediateInterval - rankReduction, 0.001);
            
            const extraHitsPerAction = gradeBaseHits + starBonusHits + transHits + passiveHits; 
            const extraActionCount = 60 / finalExtraInterval;
            const extraFinalHits = extraActionCount * extraHitsPerAction;

            elements.displayExtraInterval.innerText = finalExtraInterval.toFixed(3) + 's';
            elements.displayGradeHits.innerText = extraHitsPerAction + '타';

            // 3. 오라
            const auraLv = parseInt(elements.aura.value);
            const auraStats = getSpecialStats(auraLv);
            let aFinalHits = 0;
            let aIntVal = auraStats.interval;
            let aHitsPerAction = 0;
            if (auraLv > 0) {
                aIntVal = Math.max(auraStats.interval - blessingReduc, 0.001);
                aHitsPerAction = auraStats.hits + blessingBonusHits; 
                const aActionCount = 60 / aIntVal;
                aFinalHits = aActionCount * aHitsPerAction;
            }
            elements.displayAuraIntervalInner.innerText = auraLv > 0 ? aIntVal.toFixed(3) + 's' : '1.000s';
            elements.displayAuraHits.innerText = auraLv > 0 ? aHitsPerAction + '타' : '0타';

            // 4. 정령
            const spiritLv = parseInt(elements.spirit.value);
            const spiritStats = getSpecialStats(spiritLv);
            let sFinalHits = 0;
            let sIntVal = spiritStats.interval;
            let sHitsPerAction = 0;
            if (spiritLv > 0) {
                sIntVal = Math.max(spiritStats.interval - blessingReduc, 0.001);
                sHitsPerAction = spiritStats.hits + blessingBonusHits; 
                const sActionCount = 60 / sIntVal;
                sFinalHits = sActionCount * sHitsPerAction;
            }
            elements.displaySpiritIntervalInner.innerText = spiritLv > 0 ? sIntVal.toFixed(3) + 's' : '1.000s';
            elements.displaySpiritHits.innerText = spiritLv > 0 ? sHitsPerAction + '타' : '0타';

            // UI 요약 업데이트
            elements.tInt.innerText = tInterval.toFixed(3) + 's';
            elements.eInt.innerText = finalExtraInterval.toFixed(3) + 's';
            elements.aInt.innerText = auraLv > 0 ? aIntVal.toFixed(3) + 's' : '1.000s';
            elements.sInt.innerText = spiritLv > 0 ? sIntVal.toFixed(3) + 's' : '1.000s';
            
            elements.tierPart.innerText = Math.floor(tFinalHits).toLocaleString();
            elements.extraPart.innerText = Math.floor(extraFinalHits).toLocaleString();
            elements.auraPart.innerText = Math.floor(aFinalHits).toLocaleString();
            elements.spiritPart.innerText = Math.floor(sFinalHits).toLocaleString();

            const totalSum = Math.floor(tFinalHits + extraFinalHits + aFinalHits + sFinalHits);
            elements.totalHits.innerText = totalSum.toLocaleString();
        }

        window.onload = init;
    </script>
</body>
</html>
